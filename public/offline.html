<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
    .icon { font-size: 4rem; margin-bottom: 16px; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; color: #fff; }
    p { color: #888; font-size: .9rem; }
    button { margin-top: 24px; padding: 12px 28px; background: #7c5cbf; color: #fff; border: none; border-radius: 10px; font-size: .95rem; cursor: pointer; }
  </style>
</head>
<body>
  <div>
    <div class="icon">📶</div>
    <h1>You're offline</h1>
    <p>Please check your internet connection and try again.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
