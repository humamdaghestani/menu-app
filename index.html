<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    header h1 { font-size: 1.5rem; letter-spacing: 1px; }
    header span { font-size: 1.6rem; }

    /* ── Category Nav ── */
    nav {
      background: #16213e;
      display: flex;
      gap: 8px;
      padding: 0 32px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    nav::-webkit-scrollbar { display: none; }

    nav button {
      background: none;
      border: none;
      color: #aaa;
      font-size: .95rem;
      padding: 14px 18px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      transition: color .2s, border-color .2s;
    }
    nav button:hover { color: #fff; }
    nav button.active {
      color: #e94560;
      border-bottom-color: #e94560;
      font-weight: 600;
    }

    /* ── Search ── */
    .toolbar {
      padding: 20px 32px 0;
      display: flex;
      justify-content: flex-end;
    }
    .toolbar input {
      padding: 9px 14px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: .9rem;
      width: 240px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .toolbar input:focus {
      border-color: #e94560;
      box-shadow: 0 0 0 3px rgba(233,69,96,.15);
    }

    /* ── Items Grid ── */
    main {
      padding: 20px 32px 48px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,.14);
    }
    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }
    .card-body { padding: 14px; }
    .card-body h3 { font-size: 1rem; margin-bottom: 4px; }
    .card-body .price {
      color: #e94560;
      font-weight: 700;
      font-size: 1.05rem;
    }
    .card-body .short-desc {
      color: #777;
      font-size: .82rem;
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* empty state */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
      color: #aaa;
      font-size: 1.1rem;
    }

    /* ── Modal ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 16px;
      max-width: 480px;
      width: 100%;
      overflow: hidden;
      animation: popIn .22s ease;
      position: relative;
    }
    @keyframes popIn {
      from { transform: scale(.9); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }

    .modal img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
    }
    .modal-body { padding: 22px 24px 28px; }
    .modal-body h2 { font-size: 1.35rem; margin-bottom: 6px; }
    .modal-body .modal-price {
      color: #e94560;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .modal-body p { color: #555; line-height: 1.6; font-size: .95rem; }

    .close-btn {
      position: absolute;
      top: 10px; right: 12px;
      background: rgba(0,0,0,.45);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 32px; height: 32px;
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 32px;
      text-align: center;
      transition: background .2s;
    }
    .close-btn:hover { background: rgba(0,0,0,.7); }
  </style>
</head>
<body>

<header>
  <span>🍽️</span>
  <h1>Our Menu</h1>
</header>

<nav id="categoryNav"></nav>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="Search items..." />
</div>

<main id="itemsGrid"></main>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="close-btn" id="closeModal">&times;</button>
    <img id="modalImg" src="" alt="" />
    <div class="modal-body">
      <h2 id="modalName"></h2>
      <div class="modal-price" id="modalPrice"></div>
      <p id="modalDesc"></p>
    </div>
  </div>
</div>

<script>
  // ─────────────────────────────────────────────
  //  DATA  — edit or replace with your own items
  // ─────────────────────────────────────────────
  const categories = [
    { id: 'all',      label: '🍴 All' },
    { id: 'burgers',  label: '🍔 Burgers' },
    { id: 'pizza',    label: '🍕 Pizza' },
    { id: 'drinks',   label: '🥤 Drinks' },
    { id: 'desserts', label: '🍰 Desserts' },
  ];

  const items = [
    {
      id: 1, category: 'burgers',
      name: 'Classic Smash Burger',
      price: '$8.99',
      description: 'Two smashed beef patties with cheddar cheese, pickles, mustard, and our signature sauce on a toasted brioche bun.',
      img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500&q=80',
    },
    {
      id: 2, category: 'burgers',
      name: 'BBQ Bacon Burger',
      price: '$10.49',
      description: 'Juicy beef patty topped with crispy bacon, BBQ sauce, onion rings, and smoky cheddar on a sesame seed bun.',
      img: 'https://images.unsplash.com/photo-1553979459-d2229ba7433b?w=500&q=80',
    },
    {
      id: 3, category: 'pizza',
      name: 'Margherita Pizza',
      price: '$12.99',
      description: 'Classic Neapolitan pizza with San Marzano tomato sauce, fresh mozzarella, and hand-torn basil leaves.',
      img: 'https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=500&q=80',
    },
    {
      id: 4, category: 'pizza',
      name: 'Pepperoni Pizza',
      price: '$13.99',
      description: 'Loaded with premium pepperoni slices, mozzarella, and a rich tomato base on a hand-stretched thin crust.',
      img: 'https://images.unsplash.com/photo-1628840042765-356cda07504e?w=500&q=80',
    },
    {
      id: 5, category: 'pizza',
      name: 'BBQ Chicken Pizza',
      price: '$14.49',
      description: 'Grilled chicken, red onion, and mozzarella on a smoky BBQ base. Finished with fresh cilantro.',
      img: 'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=500&q=80',
    },
    {
      id: 6, category: 'drinks',
      name: 'Fresh Lemonade',
      price: '$3.49',
      description: 'Hand-squeezed lemons, cane sugar, and sparkling water over crushed ice. Refreshing and zesty.',
      img: 'https://images.unsplash.com/photo-1621506289937-a8e4df240d0b?w=500&q=80',
    },
    {
      id: 7, category: 'drinks',
      name: 'Mango Smoothie',
      price: '$4.99',
      description: 'Blended Alphonso mangoes, yoghurt, and a hint of cardamom. Thick, creamy, and tropical.',
      img: 'https://images.unsplash.com/photo-1546173159-315724a31696?w=500&q=80',
    },
    {
      id: 8, category: 'desserts',
      name: 'Chocolate Lava Cake',
      price: '$6.49',
      description: 'Warm dark chocolate cake with a gooey molten centre. Served with a scoop of vanilla bean ice cream.',
      img: 'https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=500&q=80',
    },
    {
      id: 9, category: 'desserts',
      name: 'Cheesecake Slice',
      price: '$5.99',
      description: 'New York-style baked cheesecake on a graham cracker crust, topped with fresh strawberry compote.',
      img: 'https://images.unsplash.com/photo-1567171466295-4afa63d45416?w=500&q=80',
    },
    {
      id: 10, category: 'burgers',
      name: 'Veggie Burger',
      price: '$9.49',
      description: 'Chickpea and quinoa patty with avocado, roasted red pepper, and sriracha mayo on a whole wheat bun.',
      img: 'https://images.unsplash.com/photo-1520072959219-c595dc870360?w=500&q=80',
    },
  ];

  // ─────────────────────────────────────────────
  //  STATE
  // ─────────────────────────────────────────────
  let activeCategory = 'all';
  let searchQuery = '';

  // ─────────────────────────────────────────────
  //  BUILD CATEGORY NAV
  // ─────────────────────────────────────────────
  const nav = document.getElementById('categoryNav');
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.textContent = cat.label;
    btn.dataset.id = cat.id;
    if (cat.id === activeCategory) btn.classList.add('active');
    btn.addEventListener('click', () => {
      activeCategory = cat.id;
      nav.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    });
    nav.appendChild(btn);
  });

  // ─────────────────────────────────────────────
  //  SEARCH
  // ─────────────────────────────────────────────
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase();
    renderGrid();
  });

  // ─────────────────────────────────────────────
  //  RENDER GRID
  // ─────────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById('itemsGrid');
    grid.innerHTML = '';

    const filtered = items.filter(item => {
      const matchCat = activeCategory === 'all' || item.category === activeCategory;
      const matchSearch = item.name.toLowerCase().includes(searchQuery) ||
                          item.description.toLowerCase().includes(searchQuery);
      return matchCat && matchSearch;
    });

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty">No items found.</div>';
      return;
    }

    filtered.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${item.img}" alt="${item.name}" loading="lazy" />
        <div class="card-body">
          <h3>${item.name}</h3>
          <div class="price">${item.price}</div>
          <div class="short-desc">${item.description}</div>
        </div>
      `;
      card.addEventListener('click', () => openModal(item));
      grid.appendChild(card);
    });
  }

  // ─────────────────────────────────────────────
  //  MODAL
  // ─────────────────────────────────────────────
  function openModal(item) {
    document.getElementById('modalImg').src = item.img;
    document.getElementById('modalImg').alt = item.name;
    document.getElementById('modalName').textContent = item.name;
    document.getElementById('modalPrice').textContent = item.price;
    document.getElementById('modalDesc').textContent = item.description;
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  // ─────────────────────────────────────────────
  //  INIT
  // ─────────────────────────────────────────────
  renderGrid();
</script>
</body>
</html>
